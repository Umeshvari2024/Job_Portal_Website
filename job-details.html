<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Details - Job Portal</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body data-page="details">

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">💼 JobPortal</div>

    <nav class="nav">
        <a href="index.html">Home</a>
        <a href="jobs.html">Jobs</a>
        <a href="apply.html">Apply</a>
    </nav>

    <button class="theme-btn" id="themeToggle">🌙</button>
</header>

<!-- CONTENT -->
<section class="section">

<div id="jobBox" class="card" style="max-width:700px;margin:auto;padding:25px"></div>

</section>

<script>
const jobs = {

    frontend: {
        title: "Frontend Developer",
        company: "Google",
        image: "https://images.unsplash.com/photo-1498050108023-c5249f4df085",
        domain: "Web Development",
        skills: "HTML, CSS, JavaScript, React",
        experience: "1–3 Years",
        description: "Build modern responsive web interfaces with React and modern JS frameworks."
    },

    backend: {
        title: "Backend Developer",
        company: "Amazon",
        image: "https://images.unsplash.com/photo-1521737604893-d14cc237f11d",
        domain: "Server Side Development",
        skills: "Java, Spring Boot, Node.js",
        experience: "2–4 Years",
        description: "Develop scalable backend systems, APIs and microservices."
    },

    uiux: {
        title: "UI/UX Designer",
        company: "Adobe",
        image: "https://images.unsplash.com/photo-1559028012-481c04fa702d",
        domain: "Design",
        skills: "Figma, Adobe XD, Photoshop",
        experience: "1–3 Years",
        description: "Design clean and user-friendly digital experiences."
    },

    fullstack: {
        title: "Full Stack Developer",
        company: "Microsoft",
        image: "https://images.unsplash.com/photo-1522071820081-009f0129c71c",
        domain: "Full Stack Development",
        skills: "MongoDB, Express, React, Node.js",
        experience: "2–5 Years",
        description: "Work on both frontend and backend systems."
    },

    data: {
        title: "Data Analyst",
        company: "Deloitte",
        image: "https://images.unsplash.com/photo-1551836022-d5d88e9218df",
        domain: "Data Analytics",
        skills: "Excel, SQL, Power BI",
        experience: "1–4 Years",
        description: "Analyze data and generate business insights."
    },

    devops: {
        title: "DevOps Engineer",
        company: "Netflix",
        image: "https://images.unsplash.com/photo-1553877522-43269d4ea984",
        domain: "Cloud & DevOps",
        skills: "AWS, Docker, Kubernetes, CI/CD",
        experience: "2–5 Years",
        description: "Manage deployment pipelines and cloud infrastructure."
    },

    software: {
        title: "Software Engineer",
        company: "Infosys",
        image: "https://images.unsplash.com/photo-1551434678-e076c223a692",
        domain: "Software Development",
        skills: "Java, DSA, System Design",
        experience: "1–5 Years",
        description: "Develop enterprise-level software solutions."
    },

    product: {
        title: "Product Manager",
        company: "Flipkart",
        image: "https://images.unsplash.com/photo-1522202176988-66273c2fd55f",
        domain: "Product Management",
        skills: "Agile, Strategy, Roadmap",
        experience: "3–6 Years",
        description: "Lead product planning and execution."
    },

    cloud: {
        title: "Cloud Engineer",
        company: "AWS",
        image: "https://images.unsplash.com/photo-1504384308090-c894fdcc538d",
        domain: "Cloud Computing",
        skills: "AWS, Azure, DevOps",
        experience: "2–5 Years",
        description: "Manage cloud systems and infrastructure."
    }

};

const params = new URLSearchParams(window.location.search);
const jobKey = params.get("job");

const job = jobs[jobKey];
const box = document.getElementById("jobBox");

if (job) {
    box.innerHTML = `
        <img src="${job.image}" style="width:100%;border-radius:12px;margin-bottom:15px;">
        <h2>${job.title}</h2>
        <p><b>Company:</b> ${job.company}</p>
        <p><b>Domain:</b> ${job.domain}</p>
        <p><b>Skills:</b> ${job.skills}</p>
        <p><b>Experience:</b> ${job.experience}</p>
        <p><b>Description:</b> ${job.description}</p>

        <div style="margin-top:15px;display:flex;gap:10px;">
            <button class="apply-btn" onclick="location.href='apply.html?job=${jobKey}'">
                Apply Now
            </button>

            <button class="details-btn" onclick="history.back()">
                ← Back
            </button>
        </div>
    `;
} else {
    box.innerHTML = "<h3 style='text-align:center'>Job not found ❌</h3>";
}
</script>

</body>
</html>
